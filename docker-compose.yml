services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: embodied
      POSTGRES_PASSWORD: embodied
      POSTGRES_DB: embodied
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U embodied -d embodied"]
      interval: 5s
      timeout: 5s
      retries: 20

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  backend:
    build: ./backend
    environment:
      PORT: 4000
      DATA_BACKEND: db
      DATABASE_URL: postgres://embodied:embodied@postgres:5432/embodied
      ELASTICSEARCH_URL: http://elasticsearch:9200
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
  esdata:
